name: Feature Request
description: Suggest an improvement to GitRadar.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: Describe the change as concretely as possible.
      placeholder: What should GitRadar do instead?
    validations:
      required: true
  - type: textarea
    id: user_value
    attributes:
      label: User Value
      description: Why is this worth adding?
      placeholder: How does this improve discovery, explainability, automation, or operations?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: What workarounds or alternatives have you considered?
    validations:
      required: false
