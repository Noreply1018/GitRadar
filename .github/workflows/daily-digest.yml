name: Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  generate-and-send:
    name: Generate And Send Daily Digest
    runs-on: ubuntu-latest
    env:
      GITRADAR_GITHUB_TOKEN: ${{ secrets.GITRADAR_GITHUB_TOKEN }}
      GR_API_KEY: ${{ secrets.GR_API_KEY }}
      GR_BASE_URL: ${{ secrets.GR_BASE_URL }}
      GR_MODEL: ${{ secrets.GR_MODEL }}
      GITRADAR_WECOM_WEBHOOK_URL: ${{ secrets.GITRADAR_WECOM_WEBHOOK_URL }}
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      GITRADAR_TRIGGER: ${{ github.event_name }}
      GITRADAR_WORKFLOW_NAME: ${{ github.workflow }}
      GITRADAR_REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve scheduled slot
        id: schedule_slot
        run: |
          node --input-type=module <<'EOF'
          import { appendFile, readFile } from "node:fs/promises";

          const outputPath = process.env.GITHUB_OUTPUT;
          const eventName = process.env.GITHUB_EVENT_NAME ?? "";

          if (eventName === "workflow_dispatch") {
            if (outputPath) {
              await appendFile(outputPath, "should_run=true\n", "utf8");
              await appendFile(outputPath, "reason=manual-dispatch\n", "utf8");
            }
            process.exit(0);
          }

          const raw = await readFile("config/schedule.json", "utf8");
          const config = JSON.parse(raw);
          const timezone = String(config?.timezone ?? "Asia/Shanghai");
          const dailySendTime = String(config?.dailySendTime ?? "08:17");
          const formatter = new Intl.DateTimeFormat("en-CA", {
            timeZone: timezone,
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
          });
          const parts = Object.fromEntries(
            formatter
              .formatToParts(new Date())
              .filter((part) => part.type !== "literal")
              .map((part) => [part.type, part.value]),
          );
          const currentLocalTime = `${parts.hour}:${parts.minute}`;
          const shouldRun = currentLocalTime === dailySendTime;

          if (outputPath) {
            await appendFile(
              outputPath,
              `should_run=${shouldRun ? "true" : "false"}\n`,
              "utf8",
            );
            await appendFile(
              outputPath,
              `reason=${timezone} ${currentLocalTime}\n`,
              "utf8",
            );
          }
          EOF
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Generate and send digest
        if: steps.schedule_slot.outputs.should_run == 'true'
        run: npm run generate:digest -- --send

      - name: Notify WeCom on failure
        if: failure() && steps.schedule_slot.outputs.should_run == 'true' && env.GITRADAR_WECOM_WEBHOOK_URL != ''
        run: |
          node --input-type=module <<'EOF'
          const webhook = process.env.GITRADAR_WECOM_WEBHOOK_URL;

          if (!webhook) {
            process.exit(0);
          }

          const lines = [
            "# GitRadar 任务失败",
            "",
            `工作流：${process.env.GITRADAR_WORKFLOW_NAME ?? "Daily Digest"}`,
            `触发方式：${process.env.GITRADAR_TRIGGER ?? "unknown"}`,
            `失败时间：${new Date().toISOString()}`,
            "详情：GitHub Actions 定时或手动运行失败。",
            `查看日志：[GitHub Actions](${process.env.WORKFLOW_RUN_URL})`,
          ];

          const response = await fetch(webhook, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              msgtype: "markdown",
              markdown: { content: lines.join("\n") },
            }),
          });

          if (!response.ok) {
            throw new Error(`WeCom notify request failed with status ${response.status}.`);
          }

          const body = await response.json();
          if (body.errcode !== 0) {
            throw new Error(
              `WeCom notify responded with errcode=${body.errcode ?? "unknown"} errmsg=${body.errmsg ?? "unknown"}.`,
            );
          }
          EOF

      - name: Persist GitHub runtime state
        if: always() && steps.schedule_slot.outputs.should_run == 'true'
        run: npm run runtime:github
        env:
          GITRADAR_JOB_STATUS: ${{ job.status }}

      - name: Persist generated archives and runtime state
        if: always() && steps.schedule_slot.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITRADAR_PERSIST_MODE: direct
          GITRADAR_BASE_BRANCH: ${{ github.event.repository.default_branch }}
          GITRADAR_COMMIT_MESSAGE: "chore: persist daily digest artifacts"
        run: |
          FILES=$(find data/history -maxdepth 1 -type f -name '*.json' | sort)
          if [ -n "$FILES" ]; then
            export GITRADAR_FILE_PATHS="${FILES}"$'\n'"data/runtime/github-runtime.json"
          else
            export GITRADAR_FILE_PATHS="data/runtime/github-runtime.json"
          fi
          npm run persist:github
