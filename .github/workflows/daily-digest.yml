name: Daily Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  generate-and-send:
    name: Generate And Send Daily Digest
    runs-on: ubuntu-latest
    env:
      GITRADAR_GITHUB_TOKEN: ${{ secrets.GITRADAR_GITHUB_TOKEN }}
      GR_API_KEY: ${{ secrets.GR_API_KEY }}
      GR_BASE_URL: ${{ secrets.GR_BASE_URL }}
      GR_MODEL: ${{ secrets.GR_MODEL }}
      GITRADAR_WECOM_WEBHOOK_URL: ${{ secrets.GITRADAR_WECOM_WEBHOOK_URL }}
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      GITRADAR_TRIGGER: ${{ github.event_name }}
      GITRADAR_WORKFLOW_NAME: ${{ github.workflow }}
      GITRADAR_REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate and send digest
        run: npm run generate:digest -- --send

      - name: Notify WeCom on failure
        if: failure() && env.GITRADAR_WECOM_WEBHOOK_URL != ''
        run: |
          node --input-type=module <<'EOF'
          const webhook = process.env.GITRADAR_WECOM_WEBHOOK_URL;

          if (!webhook) {
            process.exit(0);
          }

          const lines = [
            "# GitRadar 任务失败",
            "",
            `工作流：${process.env.GITRADAR_WORKFLOW_NAME ?? "Daily Digest"}`,
            `触发方式：${process.env.GITRADAR_TRIGGER ?? "unknown"}`,
            `失败时间：${new Date().toISOString()}`,
            "详情：GitHub Actions 定时或手动运行失败。",
            `查看日志：[GitHub Actions](${process.env.WORKFLOW_RUN_URL})`,
          ];

          const response = await fetch(webhook, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              msgtype: "markdown",
              markdown: { content: lines.join("\n") },
            }),
          });

          if (!response.ok) {
            throw new Error(`WeCom notify request failed with status ${response.status}.`);
          }

          const body = await response.json();
          if (body.errcode !== 0) {
            throw new Error(
              `WeCom notify responded with errcode=${body.errcode ?? "unknown"} errmsg=${body.errmsg ?? "unknown"}.`,
            );
          }
          EOF

      - name: Persist GitHub runtime state
        if: always()
        run: |
          mkdir -p data/runtime
          node --input-type=module <<'EOF'
          import { readdir, writeFile } from "node:fs/promises";

          const files = await readdir("data/history").catch(() => []);
          const latestArchiveDate = files
            .filter((file) => /^\d{4}-\d{2}-\d{2}\.json$/.test(file))
            .map((file) => file.replace(/\.json$/, ""))
            .sort()
            .at(-1) ?? null;

          const payload = {
            source: "github",
            workflowName: process.env.GITRADAR_WORKFLOW_NAME ?? "Daily Digest",
            trigger: process.env.GITRADAR_TRIGGER ?? null,
            lastRunAt: new Date().toISOString(),
            lastRunStatus: process.env.GITRADAR_JOB_STATUS === "success" ? "success" : "failure",
            lastArchiveDate: latestArchiveDate,
            runUrl: process.env.WORKFLOW_RUN_URL ?? null,
            ref: process.env.GITRADAR_REF_NAME ?? "main",
          };

          await writeFile(
            "data/runtime/github-runtime.json",
            `${JSON.stringify(payload, null, 2)}\n`,
            "utf8",
          );
          EOF
        env:
          GITRADAR_JOB_STATUS: ${{ job.status }}

      - name: Commit generated archives and runtime state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history/*.json data/runtime/github-runtime.json
          if git diff --cached --quiet; then
            echo "No archive or runtime changes to commit."
            exit 0
          fi
          git commit -m "chore: persist daily digest artifacts"
          git push origin HEAD:main
