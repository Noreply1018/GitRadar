name: Environment Diagnose

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  diagnose:
    name: Diagnose GitRadar environment
    runs-on: ubuntu-latest
    env:
      GITRADAR_GITHUB_TOKEN: ${{ secrets.GITRADAR_GITHUB_TOKEN }}
      GR_API_KEY: ${{ secrets.GR_API_KEY }}
      GR_BASE_URL: ${{ secrets.GR_BASE_URL }}
      GR_MODEL: ${{ secrets.GR_MODEL }}
      GITRADAR_WECOM_WEBHOOK_URL: ${{ secrets.GITRADAR_WECOM_WEBHOOK_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write environment report
        run: npm run diagnose:environment

      - name: Commit environment report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/runtime/environment-report.json
          if git diff --cached --quiet; then
            echo "No environment report changes to commit."
            exit 0
          fi
          git commit -m "chore: update GitRadar environment report"
          git push origin HEAD:${{ github.event.repository.default_branch }}
