name: Deploy Pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build GitRadar Pages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web console
        env:
          VITE_GITRADAR_BASE: /${{ github.event.repository.name }}/
          VITE_GITRADAR_REPO_OWNER: ${{ github.repository_owner }}
          VITE_GITRADAR_REPO_NAME: ${{ github.event.repository.name }}
          VITE_GITRADAR_REPO_BRANCH: ${{ github.event.repository.default_branch }}
        run: npm run build:web

      - name: Print Pages build context
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"
          echo "Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo "Pages URL: https://${GITHUB_REPOSITORY_OWNER}.github.io/${{ github.event.repository.name }}/"
          echo "Pages configuration:"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" | jq .

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Inspect built site
        run: |
          echo "Files under web/dist:"
          find web/dist -maxdepth 3 -type f | sort
          echo
          echo "index.html header:"
          sed -n '1,40p' web/dist/index.html

      - name: Package Pages artifact
        run: |
          chmod -R +rX web/dist
          tar \
            --dereference \
            --hard-dereference \
            --directory web/dist \
            -cvf /tmp/github-pages.tar \
            .
          gzip -f /tmp/github-pages.tar

      - name: Inspect packaged artifact
        run: |
          ls -lh /tmp/github-pages.tar.gz
          tar -tzf /tmp/github-pages.tar.gz | sed -n '1,80p'

      - name: Upload Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: github-pages
          path: /tmp/github-pages.tar.gz
          retention-days: 1

  deploy:
    name: Deploy GitRadar Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Print deploy context
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"
          echo "Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo "Pages configuration before deploy:"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" | jq .

      - name: Deploy Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e

      - name: Summarize deployment outcome
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "deploy-pages outcome: ${{ steps.deployment.outcome }}"
          echo "Deploy job URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo "Expected Pages URL: https://${GITHUB_REPOSITORY_OWNER}.github.io/${{ github.event.repository.name }}/"
          echo "Pages configuration after deploy attempt:"
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" | jq .

      - name: Fail with diagnostic hint
        if: steps.deployment.outcome != 'success'
        run: |
          echo "::error::Pages build artifact uploaded successfully, but GitHub Pages failed during deployment. This indicates a Pages environment or service-side failure rather than a frontend build failure."
          exit 1
