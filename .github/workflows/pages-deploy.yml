name: Deploy Pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build GitRadar Pages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web console
        env:
          VITE_GITRADAR_BASE: /${{ github.event.repository.name }}/
          VITE_GITRADAR_REPO_OWNER: ${{ github.repository_owner }}
          VITE_GITRADAR_REPO_NAME: ${{ github.event.repository.name }}
          VITE_GITRADAR_REPO_BRANCH: ${{ github.event.repository.default_branch }}
        run: npm run build:web

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Package Pages artifact
        run: |
          chmod -R +rX web/dist
          tar \
            --dereference \
            --hard-dereference \
            --directory web/dist \
            -cvf /tmp/github-pages.tar \
            .
          gzip -f /tmp/github-pages.tar

      - name: Upload Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: github-pages
          path: /tmp/github-pages.tar.gz
          retention-days: 1

  deploy:
    name: Deploy GitRadar Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
