name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build GitRadar Pages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web console
        env:
          VITE_GITRADAR_BASE: /${{ github.event.repository.name }}/
          VITE_GITRADAR_REPO_OWNER: ${{ github.repository_owner }}
          VITE_GITRADAR_REPO_NAME: ${{ github.event.repository.name }}
          VITE_GITRADAR_REPO_BRANCH: ${{ github.event.repository.default_branch }}
        run: npm run build:web

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
