<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="56" y1="44" x2="1224" y2="676" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F0E3"/>
      <stop offset="0.48" stop-color="#E4EFE4"/>
      <stop offset="1" stop-color="#DBE8F6"/>
    </linearGradient>
    <filter id="shadow" x="44" y="44" width="1192" height="632" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#20364E" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="155" cy="112" r="84" fill="#E1BE70" fill-opacity="0.22"/>
  <circle cx="1110" cy="616" r="124" fill="#6A96B8" fill-opacity="0.18"/>
  <circle cx="1100" cy="116" r="52" fill="#8AA17A" fill-opacity="0.18"/>

  <g filter="url(#shadow)">
    <rect x="84" y="84" width="1112" height="552" rx="30" fill="#FFFFFF"/>
  </g>

  <text x="126" y="180" fill="#17324D" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="74" font-weight="700">GitRadar v1.2.0</text>
  <text x="126" y="236" fill="#34536D" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="28">An explainable GitHub open-source discovery radar</text>
  <text x="126" y="282" fill="#4D6883" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="21">evidence-based Chinese digests · WeCom delivery · replayable archives</text>

  <g>
    <rect x="126" y="342" width="292" height="114" rx="24" fill="#F8EED0"/>
    <text x="154" y="384" fill="#6D5214" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="700">Configurable rules</text>
    <text x="154" y="420" fill="#7C6540" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">themes, thresholds, weights,</text>
    <text x="154" y="446" fill="#7C6540" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">blacklists in repo config</text>
  </g>

  <g>
    <rect x="448" y="342" width="292" height="114" rx="24" fill="#E3F0E6"/>
    <text x="476" y="384" fill="#23533A" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="700">Validation command</text>
    <text x="476" y="420" fill="#4F7B64" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">validate:digest-rules</text>
    <text x="476" y="446" fill="#4F7B64" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">as a standalone quality gate</text>
  </g>

  <g>
    <rect x="770" y="342" width="292" height="114" rx="24" fill="#E5EEF8"/>
    <text x="798" y="384" fill="#254C7A" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="700">Verified delivery</text>
    <text x="798" y="420" fill="#4A6B93" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">real terminal run</text>
    <text x="798" y="446" fill="#4A6B93" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">and confirmed WeCom receipt</text>
  </g>

  <g>
    <rect x="126" y="500" width="936" height="88" rx="24" fill="#17324D"/>
    <text x="160" y="553" fill="#F7FBFF" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="28" font-weight="700">From a daily digest script to a product-ready radar core</text>
  </g>
</svg>
