<svg width="800" height="420" viewBox="0 0 800 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F1E8"/>
      <stop offset="0.55" stop-color="#E7F0E8"/>
      <stop offset="1" stop-color="#E3ECF7"/>
    </linearGradient>
    <filter id="shadow" x="36" y="44" width="728" height="332" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#20364E" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="800" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="730" cy="74" r="46" fill="#E0BD6C" fill-opacity="0.22"/>
  <circle cx="96" cy="348" r="60" fill="#6A96B8" fill-opacity="0.16"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="656" height="276" rx="24" fill="#FFFFFF"/>
  </g>

  <circle cx="126" cy="124" r="8" fill="#1F6FEB"/>
  <text x="146" y="131" fill="#17324D" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="26" font-weight="700">Noreply1018 / GitRadar</text>
  <text x="146" y="166" fill="#4A657D" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">一个带证据化中文日报、企业微信发送和可复盘归档的 GitHub 开源项目发现雷达。</text>

  <g>
    <rect x="104" y="198" width="138" height="34" rx="17" fill="#EAF3FF"/>
    <text x="129" y="220" fill="#245B94" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" font-weight="700">evidence-based</text>
    <rect x="254" y="198" width="122" height="34" rx="17" fill="#EAF7EE"/>
    <text x="280" y="220" fill="#2D6C46" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" font-weight="700">wecom-ready</text>
    <rect x="388" y="198" width="118" height="34" rx="17" fill="#FFF4E4"/>
    <text x="416" y="220" fill="#8B6320" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" font-weight="700">replayable</text>
    <rect x="518" y="198" width="102" height="34" rx="17" fill="#F5ECFF"/>
    <text x="547" y="220" fill="#6A3E92" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" font-weight="700">TypeScript</text>
  </g>

  <text x="104" y="272" fill="#17324D" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18" font-weight="700">Pinned preview copy</text>
  <text x="104" y="304" fill="#4A657D" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">每天从 Trending、最近更新、最近创建里筛项目，</text>
  <text x="104" y="332" fill="#4A657D" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">用规则和证据生成中文日报，并支持企业微信发送与归档复盘。</text>

  <g>
    <rect x="560" y="260" width="130" height="52" rx="20" fill="#17324D"/>
    <text x="586" y="292" fill="#F7FBFF" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="22" font-weight="700">v2.0.0</text>
